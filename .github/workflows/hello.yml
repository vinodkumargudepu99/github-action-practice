# Name of the workflow.
# This name will appear in the GitHub Actions tab.
name: Hello Workflow

# Specifies when this workflow should run.
on:
  # Allows you to manually run this workflow
  # from the GitHub Actions tab.
  workflow_dispatch:

# A workflow can have one or more jobs.
jobs:

  # Job ID (can be any name, usually lowercase with hyphens).
  say-hello:

    # Specifies which runner (virtual machine) to use.
    # GitHub will create a temporary Ubuntu VM for this job.
    runs-on: ubuntu-latest

    # A job contains one or more steps.
    steps:

      # Step 1: Display a message.
      - name: Say Hello
        run: echo "Hello"

      # Step 2: Display another message.
      - name: Say Welcome
        run: echo "Welcome to GitHub Actions"

      # Step 3: Show the current date and time.
      - name: Show Date
        run: date

      # Step 4: List files in the repository.
      # (Only works after checking out the code.)
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: List Files
        run: ls -la
